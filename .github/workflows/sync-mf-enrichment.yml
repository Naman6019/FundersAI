name: Sync MF Enrichment

on:
  workflow_dispatch:
    inputs:
      scheme_codes:
        description: 'Comma-separated AMFI scheme codes'
        required: false
        default: ''
      limit:
        description: 'Max schemes to enrich'
        required: false
        default: '200'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run MFdata enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ENABLE_MF_ENRICHMENT_SYNC: "true"
          MFDATA_TIMEOUT_SECONDS: "30"
          MFDATA_MAX_RETRIES: "4"
          MFDATA_RETRY_BACKOFF_SECONDS: "1.2"
          MFDATA_REQUEST_SLEEP_SECONDS: "6.5"
          DISPATCH_SCHEME_CODES: ${{ inputs.scheme_codes }}
          DISPATCH_LIMIT: ${{ inputs.limit }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi

          args=(--limit "${DISPATCH_LIMIT:-200}")
          if [ -n "${DISPATCH_SCHEME_CODES:-}" ]; then
            args+=(--scheme-codes "$DISPATCH_SCHEME_CODES")
          fi

          python -m backend.app.jobs.sync_mf_enrichment "${args[@]}"
