name: Compact MF Storage

on:
  schedule:
    - cron: '45 3 * * 0'
  workflow_dispatch:
    inputs:
      holdings_group_limit:
        description: 'Max holdings groups for compaction'
        required: false
        default: '1500'
      dry_run:
        description: 'Dry run only (true/false)'
        required: false
        default: 'false'

concurrency:
  group: compact-mf-storage-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  compact:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run NAV cache retention
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MF_NAV_CACHE_RETENTION_DAYS: "30"
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          DRY_RUN="${DISPATCH_DRY_RUN:-false}"
          cache_args=()
          if [ "$DRY_RUN" = "true" ]; then
            cache_args+=(--dry-run)
          fi
          python -m backend.app.jobs.cleanup_nav_api_cache "${cache_args[@]}"

      - name: Run holdings compaction
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_RAW_BUCKET: ${{ secrets.R2_RAW_BUCKET }}
          R2_COLD_BUCKET: ${{ secrets.R2_COLD_BUCKET }}
          DISPATCH_HOLDINGS_GROUP_LIMIT: ${{ inputs.holdings_group_limit }}
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          if [ -z "$R2_ENDPOINT" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_RAW_BUCKET" ] || [ -z "$R2_COLD_BUCKET" ]; then
            echo "Error: Missing R2 secrets"
            exit 1
          fi
          HOLDINGS_LIMIT="${DISPATCH_HOLDINGS_GROUP_LIMIT:-1500}"
          DRY_RUN="${DISPATCH_DRY_RUN:-false}"

          holdings_args=(--limit-groups "$HOLDINGS_LIMIT")
          if [ "$DRY_RUN" = "true" ]; then
            holdings_args+=(--dry-run)
          fi

          python -m backend.app.mf_ingestion.jobs.compact_mf_holdings_latest_only "${holdings_args[@]}"
