name: Retry MF Parser Actions

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      amcs:
        description: 'Comma-separated AMCs, in retry order'
        required: false
        default: 'axis,hdfc,sbi,icici,ppfas'
      limit:
        description: 'Max docs retried per AMC'
        required: false
        default: '50'
      min_age_hours:
        description: 'Retry only docs older than this many hours. Scheduled runs use 6 when omitted; manual runs may pass 0.'
        required: false
        default: '6'
      statuses:
        description: 'Comma-separated statuses to retry'
        required: false
        default: 'needs_review,failed,parsed_partial'

concurrency:
  group: retry-mf-parser-actions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Retry parser action documents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_RAW_BUCKET: ${{ secrets.R2_RAW_BUCKET }}
          R2_COLD_BUCKET: ${{ secrets.R2_COLD_BUCKET }}
          MF_REQUIRE_R2_FOR_RAW_STORAGE: "true"
          ENABLE_MF_OFFICIAL_SOURCE_PARSER_BYPASS: "false"
          DISPATCH_AMCS: ${{ inputs.amcs }}
          DISPATCH_LIMIT: ${{ inputs.limit }}
          DISPATCH_MIN_AGE_HOURS: ${{ inputs.min_age_hours }}
          DISPATCH_STATUSES: ${{ inputs.statuses }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_KEY:-}" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          if [ -z "${R2_ENDPOINT:-}" ] || [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_RAW_BUCKET:-}" ]; then
            echo "Error: Missing R2 secrets for parser retry"
            exit 1
          fi

          AMCS="${DISPATCH_AMCS:-axis,hdfc,sbi,icici,ppfas}"
          LIMIT="${DISPATCH_LIMIT:-50}"
          MIN_AGE_HOURS="${DISPATCH_MIN_AGE_HOURS:-6}"
          STATUSES="${DISPATCH_STATUSES:-needs_review,failed,parsed_partial}"

          IFS=',' read -ra AMC_LIST <<< "$AMCS"
          for amc in "${AMC_LIST[@]}"; do
            amc="$(echo "$amc" | xargs)"
            if [ -z "$amc" ]; then
              continue
            fi

            echo "Retrying parser actions for AMC=$amc limit=$LIMIT min_age_hours=$MIN_AGE_HOURS statuses=$STATUSES"
            timeout 45m python -m backend.app.mf_ingestion.jobs.reparse_needs_review \
              --amc "$amc" \
              --limit "$LIMIT" \
              --min-age-hours "$MIN_AGE_HOURS" \
              --statuses "$STATUSES"
          done
