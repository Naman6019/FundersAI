name: Retry MF Parser Actions

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      amcs:
        description: 'Comma-separated AMCs to retry'
        required: false
        default: 'axis,hdfc,sbi,icici,ppfas,nippon'
      limit:
        description: 'Max docs retried per AMC'
        required: false
        default: '50'
      min_age_hours:
        description: 'Retry only docs older than this many hours. Scheduled runs use 6 when omitted; manual runs may pass 0.'
        required: false
        default: '6'
      statuses:
        description: 'Comma-separated statuses to retry'
        required: false
        default: 'needs_review,failed,parsed_partial'
      extractor_mode:
        description: 'Parser mode: deterministic, deterministic_then_llm, llm_then_deterministic'
        required: false
        default: 'llm_then_deterministic'
      llm_extractor_enabled:
        description: 'Enable LLM extraction'
        required: false
        default: 'true'
      llm_extractor_model:
        description: 'LLM model for extraction'
        required: false
        default: ''
      llm_base_url:
        description: 'Optional LLM API base URL'
        required: false
        default: ''
      llm_min_write_confidence:
        description: 'Minimum confidence for LLM final writes'
        required: false
        default: '90'
      llm_allow_final_writes:
        description: 'Allow validated LLM rows to write final tables'
        required: false
        default: 'false'
      fail_on_still_actionable:
        description: 'Fail when retried docs remain failed, needs_review, or parsed_partial'
        required: false
        default: 'false'

concurrency:
  group: retry-mf-parser-actions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  retry:
    name: retry-${{ matrix.amc }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        amc: [axis, hdfc, sbi, icici, ppfas, nippon]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Retry parser action documents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_RAW_BUCKET: ${{ secrets.R2_RAW_BUCKET }}
          R2_COLD_BUCKET: ${{ secrets.R2_COLD_BUCKET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MF_REQUIRE_R2_FOR_RAW_STORAGE: "true"
          MF_EXTRACTOR_MODE: ${{ inputs.extractor_mode || vars.MF_EXTRACTOR_MODE || 'deterministic' }}
          MF_LLM_EXTRACTOR_ENABLED: ${{ inputs.llm_extractor_enabled || vars.MF_LLM_EXTRACTOR_ENABLED || 'false' }}
          MF_LLM_EXTRACTOR_MODEL: ${{ inputs.llm_extractor_model || vars.MF_LLM_EXTRACTOR_MODEL || '' }}
          MF_LLM_BASE_URL: ${{ inputs.llm_base_url || vars.MF_LLM_BASE_URL || '' }}
          MF_LLM_HTTP_REFERER: ${{ vars.MF_LLM_HTTP_REFERER || '' }}
          MF_LLM_APP_TITLE: ${{ vars.MF_LLM_APP_TITLE || 'FundersAI' }}
          MF_LLM_MIN_WRITE_CONFIDENCE: ${{ inputs.llm_min_write_confidence || vars.MF_LLM_MIN_WRITE_CONFIDENCE || '90' }}
          MF_LLM_ALLOW_FINAL_WRITES: ${{ inputs.llm_allow_final_writes || vars.MF_LLM_ALLOW_FINAL_WRITES || 'false' }}
          ENABLE_MF_OFFICIAL_SOURCE_PARSER_BYPASS: "false"
          DISPATCH_AMCS: ${{ inputs.amcs }}
          DISPATCH_LIMIT: ${{ inputs.limit }}
          DISPATCH_MIN_AGE_HOURS: ${{ inputs.min_age_hours }}
          DISPATCH_STATUSES: ${{ inputs.statuses }}
          DISPATCH_FAIL_ON_STILL_ACTIONABLE: ${{ inputs.fail_on_still_actionable }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_KEY:-}" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          if [ -z "${R2_ENDPOINT:-}" ] || [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_RAW_BUCKET:-}" ]; then
            echo "Error: Missing R2 secrets for parser retry"
            exit 1
          fi

          EVENT_NAME="${GITHUB_EVENT_NAME:-workflow_dispatch}"
          AMCS="${DISPATCH_AMCS:-axis,hdfc,sbi,icici,ppfas,nippon}"
          clean_amcs=$(echo "$AMCS" | tr -d ' ')
          if [[ ! ",$clean_amcs," == *",${{ matrix.amc }},"* ]]; then
            echo "Skipping ${{ matrix.amc }} as it is not in the requested AMCS list ($AMCS)"
            exit 0
          fi

          if [ -n "${DISPATCH_LIMIT:-}" ]; then
            LIMIT="$DISPATCH_LIMIT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            LIMIT="1"
          else
            LIMIT="50"
          fi
          MIN_AGE_HOURS="${DISPATCH_MIN_AGE_HOURS:-6}"
          STATUSES="${DISPATCH_STATUSES:-needs_review,failed,parsed_partial}"
          STRICT_RETRY_FLAG=""
          if [ "$EVENT_NAME" = "schedule" ] || [ "${DISPATCH_FAIL_ON_STILL_ACTIONABLE:-false}" = "true" ]; then
            STRICT_RETRY_FLAG="--fail-on-still-actionable"
          fi
          amc="${{ matrix.amc }}"

          echo "Retrying parser actions for AMC=$amc limit=$LIMIT min_age_hours=$MIN_AGE_HOURS statuses=$STATUSES"
          timeout 45m python -m backend.app.mf_ingestion.jobs.reparse_needs_review \
            --amc "$amc" \
            --limit "$LIMIT" \
            --min-age-hours "$MIN_AGE_HOURS" \
            --statuses "$STATUSES" \
            $STRICT_RETRY_FLAG
