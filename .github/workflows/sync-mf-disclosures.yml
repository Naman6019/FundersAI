name: Sync MF Disclosures

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:
    inputs:
      amcs:
        description: 'Comma-separated AMCs (axis,hdfc,sbi,icici,ppfas,nippon)'
        required: false
        default: 'axis,hdfc,sbi,icici,ppfas,nippon'
      max_documents:
        description: 'Max documents per AMC per document type'
        required: false
        default: '5'
      parse_limit:
        description: 'Max pending docs parsed per AMC'
        required: false
        default: '800'
      parse_rounds:
        description: 'How many parse rounds per AMC (each round uses parse_limit)'
        required: false
        default: '3'
      hdfc_factsheet_urls:
        description: 'Optional exact HDFC factsheet URLs, comma-separated'
        required: false
        default: ''
      hdfc_portfolio_urls:
        description: 'Optional exact HDFC portfolio URLs, comma-separated'
        required: false
        default: ''
      axis_factsheet_urls:
        description: 'Optional exact Axis factsheet URLs, comma-separated'
        required: false
        default: ''
      axis_portfolio_urls:
        description: 'Optional exact Axis portfolio URLs, comma-separated'
        required: false
        default: ''
      sbi_factsheet_urls:
        description: 'Optional exact SBI factsheet URLs, comma-separated'
        required: false
        default: ''
      nippon_factsheet_urls:
        description: 'Optional exact Nippon factsheet page URL (or direct PDF)'
        required: false
        default: ''
      strict_coverage_amcs:
        description: 'Comma-separated AMCs enforced by strict coverage gate'
        required: false
        default: ''
      allow_hdfc_factsheet_as_portfolio:
        description: 'Allow HDFC factsheet URLs to be reused for portfolio extraction'
        required: false
        default: 'false'

concurrency:
  group: sync-mf-disclosures-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        amc: [axis, hdfc, sbi, icici, ppfas, nippon]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Playwright browser (Axis only)
        if: matrix.amc == 'axis'
        run: playwright install chromium --with-deps

      - name: Ingest + parse disclosures
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_RAW_BUCKET: ${{ secrets.R2_RAW_BUCKET }}
          R2_COLD_BUCKET: ${{ secrets.R2_COLD_BUCKET }}
          MF_HDFC_FACTSHEET_PAGE_URL: ${{ secrets.MF_HDFC_FACTSHEET_PAGE_URL }}
          MF_HDFC_PORTFOLIO_PAGE_URL: ${{ secrets.MF_HDFC_PORTFOLIO_PAGE_URL }}
          MF_AXIS_FACTSHEET_PAGE_URL: ${{ secrets.MF_AXIS_FACTSHEET_PAGE_URL }}
          MF_AXIS_PORTFOLIO_PAGE_URL: ${{ secrets.MF_AXIS_PORTFOLIO_PAGE_URL }}
          MF_SBI_FACTSHEET_PAGE_URL: ${{ secrets.MF_SBI_FACTSHEET_PAGE_URL }}
          MF_SBI_PORTFOLIO_PAGE_URL: ${{ secrets.MF_SBI_PORTFOLIO_PAGE_URL }}
          MF_NIPPON_FACTSHEET_PAGE_URL: ${{ secrets.MF_NIPPON_FACTSHEET_PAGE_URL }}
          MF_NIPPON_PORTFOLIO_PAGE_URL: ${{ secrets.MF_NIPPON_PORTFOLIO_PAGE_URL }}
          MF_HDFC_FACTSHEET_DOCUMENT_URLS: ${{ secrets.MF_HDFC_FACTSHEET_DOCUMENT_URLS }}
          MF_HDFC_PORTFOLIO_DOCUMENT_URLS: ${{ secrets.MF_HDFC_PORTFOLIO_DOCUMENT_URLS }}
          MF_AXIS_FACTSHEET_DOCUMENT_URLS: ${{ secrets.MF_AXIS_FACTSHEET_DOCUMENT_URLS }}
          MF_AXIS_PORTFOLIO_DOCUMENT_URLS: ${{ secrets.MF_AXIS_PORTFOLIO_DOCUMENT_URLS }}
          MF_SBI_FACTSHEET_DOCUMENT_URLS: ${{ secrets.MF_SBI_FACTSHEET_DOCUMENT_URLS }}
          MF_SBI_PORTFOLIO_DOCUMENT_URLS: ${{ secrets.MF_SBI_PORTFOLIO_DOCUMENT_URLS }}
          MF_MOTILAL_FACTSHEET_DOCUMENT_URLS: ${{ secrets.MF_MOTILAL_FACTSHEET_DOCUMENT_URLS }}
          MF_MOTILAL_PORTFOLIO_DOCUMENT_URLS: ${{ secrets.MF_MOTILAL_PORTFOLIO_DOCUMENT_URLS }}
          MF_NIPPON_FACTSHEET_DOCUMENT_URLS: ${{ secrets.MF_NIPPON_FACTSHEET_DOCUMENT_URLS }}
          MF_NIPPON_PORTFOLIO_DOCUMENT_URLS: ${{ secrets.MF_NIPPON_PORTFOLIO_DOCUMENT_URLS }}
          MF_ALLOW_HDFC_FACTSHEET_AS_PORTFOLIO: ${{ github.event.inputs.allow_hdfc_factsheet_as_portfolio }}
          MF_REQUIRE_R2_FOR_RAW_STORAGE: "true"
          MF_EXTRACTOR_MODE: ${{ vars.MF_EXTRACTOR_MODE || 'deterministic' }}
          MF_LLM_EXTRACTOR_ENABLED: ${{ vars.MF_LLM_EXTRACTOR_ENABLED || 'false' }}
          MF_LLM_EXTRACTOR_MODEL: ${{ vars.MF_LLM_EXTRACTOR_MODEL || '' }}
          MF_LLM_MIN_WRITE_CONFIDENCE: ${{ vars.MF_LLM_MIN_WRITE_CONFIDENCE || '90' }}
          MF_LLM_ALLOW_FINAL_WRITES: ${{ vars.MF_LLM_ALLOW_FINAL_WRITES || 'false' }}
          MF_SOURCE_MANIFEST_PATH: ${{ vars.MF_SOURCE_MANIFEST_PATH || '' }}
          ENABLE_MF_OFFICIAL_SOURCE_PARSER_BYPASS: "false"
          DISPATCH_AMCS: ${{ github.event.inputs.amcs }}
          DISPATCH_MAX_DOCS: ${{ github.event.inputs.max_documents }}
          DISPATCH_PARSE_LIMIT: ${{ github.event.inputs.parse_limit }}
          DISPATCH_PARSE_ROUNDS: ${{ github.event.inputs.parse_rounds }}
          DISPATCH_HDFC_FACTSHEET_URLS: ${{ github.event.inputs.hdfc_factsheet_urls }}
          DISPATCH_HDFC_PORTFOLIO_URLS: ${{ github.event.inputs.hdfc_portfolio_urls }}
          DISPATCH_AXIS_FACTSHEET_URLS: ${{ github.event.inputs.axis_factsheet_urls }}
          DISPATCH_AXIS_PORTFOLIO_URLS: ${{ github.event.inputs.axis_portfolio_urls }}
          DISPATCH_SBI_FACTSHEET_URLS: ${{ github.event.inputs.sbi_factsheet_urls }}
          DISPATCH_NIPPON_FACTSHEET_URLS: ${{ github.event.inputs.nippon_factsheet_urls }}
          DISPATCH_MOTILAL_FACTSHEET_URLS: ${{ github.event.inputs.motilal_factsheet_urls }}
          DISPATCH_MOTILAL_PORTFOLIO_URLS: ${{ github.event.inputs.motilal_portfolio_urls }}
          DISPATCH_ALLOW_HDFC_FACTSHEET_AS_PORTFOLIO: ${{ github.event.inputs.allow_hdfc_factsheet_as_portfolio }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          if [ -z "$R2_ENDPOINT" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_RAW_BUCKET" ] || [ -z "$R2_COLD_BUCKET" ]; then
            echo "Error: Missing R2 secrets for R2-first ingestion"
            exit 1
          fi

          # Force stable source URLs even when optional URL secrets are unset.
          export MF_HDFC_FACTSHEET_PAGE_URL="${MF_HDFC_FACTSHEET_PAGE_URL:-https://www.hdfcfund.com/mutual-funds/factsheets}"
          export MF_HDFC_PORTFOLIO_PAGE_URL="${MF_HDFC_PORTFOLIO_PAGE_URL:-https://www.hdfcfund.com/statutory-disclosure/portfolio/monthly-portfolio}"
          export MF_AXIS_FACTSHEET_PAGE_URL="${MF_AXIS_FACTSHEET_PAGE_URL:-https://www.axismf.com/downloads}"
          export MF_AXIS_PORTFOLIO_PAGE_URL="${MF_AXIS_PORTFOLIO_PAGE_URL:-https://www.axismf.com/downloads}"
          export MF_SBI_FACTSHEET_PAGE_URL="${MF_SBI_FACTSHEET_PAGE_URL:-https://www.sbimf.com/factsheets}"
          export MF_SBI_PORTFOLIO_PAGE_URL="${MF_SBI_PORTFOLIO_PAGE_URL:-https://www.sbimf.com/portfolios}"
          _nippon_year=$(date -d "-1 month" +%Y 2>/dev/null || python3 -c "from datetime import date; from dateutil.relativedelta import relativedelta; d=date.today()-relativedelta(months=1); print(d.year)")
          _nippon_month=$(date -d "-1 month" +%B 2>/dev/null || python3 -c "from datetime import date; from dateutil.relativedelta import relativedelta; d=date.today()-relativedelta(months=1); print(d.strftime('%B'))")
          export MF_NIPPON_FACTSHEET_PAGE_URL="${MF_NIPPON_FACTSHEET_PAGE_URL:-https://mf.nipponindiaim.com/InvestorServices/FactsheetsDocuments/Fundamentals-${_nippon_month}-${_nippon_year}/index.html}"
          echo "Nippon factsheet page URL: $MF_NIPPON_FACTSHEET_PAGE_URL"
          # Allow dispatch override of the Nippon page URL (supports a direct PDF too)
          if [ -n "${DISPATCH_NIPPON_FACTSHEET_URLS:-}" ]; then
            export MF_NIPPON_FACTSHEET_PAGE_URL="$DISPATCH_NIPPON_FACTSHEET_URLS"
            export MF_NIPPON_FACTSHEET_DOCUMENT_URLS="$DISPATCH_NIPPON_FACTSHEET_URLS"
          fi
          export MF_NIPPON_PORTFOLIO_PAGE_URL="${MF_NIPPON_PORTFOLIO_PAGE_URL:-https://mf.nipponindiaim.com/investor-service/downloads/factsheet-portfolio-and-other-disclosures}"

          if [ -n "${DISPATCH_HDFC_FACTSHEET_URLS:-}" ]; then
            export MF_HDFC_FACTSHEET_DOCUMENT_URLS="$DISPATCH_HDFC_FACTSHEET_URLS"
          fi
          if [ -n "${DISPATCH_HDFC_PORTFOLIO_URLS:-}" ]; then
            export MF_HDFC_PORTFOLIO_DOCUMENT_URLS="$DISPATCH_HDFC_PORTFOLIO_URLS"
          fi
          if [ -n "${DISPATCH_AXIS_FACTSHEET_URLS:-}" ]; then
            export MF_AXIS_FACTSHEET_DOCUMENT_URLS="$DISPATCH_AXIS_FACTSHEET_URLS"
          fi
          if [ -n "${DISPATCH_AXIS_PORTFOLIO_URLS:-}" ]; then
            export MF_AXIS_PORTFOLIO_DOCUMENT_URLS="$DISPATCH_AXIS_PORTFOLIO_URLS"
          fi
          if [ -n "${DISPATCH_SBI_FACTSHEET_URLS:-}" ]; then
            export MF_SBI_FACTSHEET_DOCUMENT_URLS="$DISPATCH_SBI_FACTSHEET_URLS"
          fi
          if [ -n "${DISPATCH_MOTILAL_FACTSHEET_URLS:-}" ]; then
            export MF_MOTILAL_FACTSHEET_DOCUMENT_URLS="$DISPATCH_MOTILAL_FACTSHEET_URLS"
          fi
          if [ -n "${DISPATCH_MOTILAL_PORTFOLIO_URLS:-}" ]; then
            export MF_MOTILAL_PORTFOLIO_DOCUMENT_URLS="$DISPATCH_MOTILAL_PORTFOLIO_URLS"
          fi

          export MF_ALLOW_HDFC_FACTSHEET_AS_PORTFOLIO="${MF_ALLOW_HDFC_FACTSHEET_AS_PORTFOLIO:-${DISPATCH_ALLOW_HDFC_FACTSHEET_AS_PORTFOLIO:-false}}"

          EVENT_NAME="${GITHUB_EVENT_NAME:-workflow_dispatch}"
          AMCS="${DISPATCH_AMCS:-axis,hdfc,sbi,icici,ppfas,nippon,motilal}"
          GLOBAL_MAX_DOCS="${DISPATCH_MAX_DOCS:-5}"
          GLOBAL_PARSE_LIMIT="${DISPATCH_PARSE_LIMIT:-800}"
          PARSE_ROUNDS="${DISPATCH_PARSE_ROUNDS:-3}"

          # Check if the matrix amc is in the AMCS list
          # We add commas around both sides to ensure exact matching (e.g. ,axis, against ,axis,hdfc,)
          # We also strip spaces just in case
          clean_amcs=$(echo "$AMCS" | tr -d ' ')
          if [[ ! ",$clean_amcs," == *",${{ matrix.amc }},"* ]]; then
            echo "Skipping ${{ matrix.amc }} as it is not in the requested AMCS list ($AMCS)"
            exit 0
          fi

          amc="${{ matrix.amc }}"
          
          # Safer scheduled defaults to stay well below GitHub-hosted 6h limit.
          max_docs="$GLOBAL_MAX_DOCS"
          parse_limit="$GLOBAL_PARSE_LIMIT"
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$amc" in
              axis)  max_docs=1; parse_limit=900 ;;
              ppfas) max_docs=1; parse_limit=500 ;;
              hdfc)  max_docs=1; parse_limit=700 ;;
              sbi)   max_docs=1; parse_limit=900 ;;
              icici) max_docs=1; parse_limit=900 ;;
              nippon) max_docs=1; parse_limit=900 ;;
              *)     max_docs=1; parse_limit=600 ;;
            esac
          fi

          echo "Processing AMC=$amc max_docs=$max_docs parse_limit=$parse_limit parse_rounds=$PARSE_ROUNDS event=$EVENT_NAME"

          if [ "$amc" = "hdfc" ]; then
            python - <<'PY'
          import os
          import sys
          from urllib.parse import urlparse

          sys.path.insert(0, os.path.abspath('backend'))
          from app.mf_ingestion.downloaders.amc_downloader import _request_with_retry


          def split_urls(name):
              return [token.strip() for token in os.getenv(name, "").split(",") if token.strip()]


          def truthy(value):
              return str(value or "").strip().lower() in {"1", "true", "yes", "on"}


          factsheet_urls = split_urls("MF_HDFC_FACTSHEET_DOCUMENT_URLS")
          portfolio_urls = split_urls("MF_HDFC_PORTFOLIO_DOCUMENT_URLS")
          allow_factsheet_as_portfolio = truthy(os.getenv("MF_ALLOW_HDFC_FACTSHEET_AS_PORTFOLIO"))

          if not factsheet_urls:
              print("Error: HDFC strict ingestion requires MF_HDFC_FACTSHEET_DOCUMENT_URLS or hdfc_factsheet_urls.")
              sys.exit(1)
          if not portfolio_urls and not allow_factsheet_as_portfolio:
              print("Error: HDFC strict ingestion requires MF_HDFC_PORTFOLIO_DOCUMENT_URLS or hdfc_portfolio_urls.")
              sys.exit(1)

          checks = [("factsheet", url) for url in factsheet_urls]
          checks.extend(("portfolio_disclosure", url) for url in portfolio_urls)
          if allow_factsheet_as_portfolio and not portfolio_urls:
              checks.extend(("portfolio_disclosure", url) for url in factsheet_urls)

          headers = {"User-Agent": os.getenv("MF_USER_AGENT", "Mozilla/5.0"), "Referer": "https://www.hdfcfund.com/"}
          failures = []
          for document_type, url in checks:
              parsed = urlparse(url)
              if parsed.scheme not in {"http", "https"} or not parsed.netloc:
                  failures.append(f"{document_type}:{url}:invalid_url")
                  continue
              try:
                  response = _request_with_retry("GET", url, headers=headers, timeout_seconds=20)
                  status = response.status_code
              except Exception as exc:
                  failures.append(f"{document_type}:{url}:{exc}")
                  continue
              if status >= 400:
                  failures.append(f"{document_type}:{url}:http_{status}")

          if failures:
              print("Error: HDFC preflight download checks failed:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          PY
          fi

          if ! timeout 40m python -m backend.app.mf_ingestion.jobs.ingest_latest_amc_docs --amc "$amc" --all-document-types --max-documents "$max_docs" --strict; then
            echo "AMC ingest failed/timed out: $amc"
            exit 1
          fi

          amc_failed=false
          round=1
          while [ "$round" -le "$PARSE_ROUNDS" ]; do
            echo "AMC=$amc parse_round=$round/$PARSE_ROUNDS"
            if ! timeout 85m python -m backend.app.mf_ingestion.jobs.parse_pending_documents --amc "$amc" --limit "$parse_limit" --strict; then
              amc_failed=true
              echo "AMC parse failed/timed out: $amc round=$round"
              break
            fi
            round=$((round + 1))
          done

          if [ "$amc_failed" = "true" ]; then
            exit 1
          fi

  coverage:
    needs: sync-matrix
    # Run even if one of the matrix jobs fails, so we still get coverage numbers
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check MF disclosure coverage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MF_DISCLOSURE_COVERAGE_AMCS: axis,hdfc,sbi,icici,ppfas,nippon
          MF_DISCLOSURE_STRICT_COVERAGE_AMCS: ${{ github.event.inputs.strict_coverage_amcs }}
          MF_DISCLOSURE_MIN_FIELD_COUNT: "1"
          MF_DISCLOSURE_MIN_CORE_FIELD_RATIO: "0.01"
          MF_DISCLOSURE_MIN_PORTFOLIO_FAMILY_RATIO: "0.01"
        run: |
          python backend/scripts/check_coverage.py
          python backend/scripts/check_mf_disclosure_coverage.py
