name: Sync MF Disclosures

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:
    inputs:
      amcs:
        description: 'Comma-separated AMCs (ppfas,icici,hdfc,sbi)'
        required: false
        default: 'ppfas,icici,hdfc,sbi'
      max_documents:
        description: 'Max documents per AMC per document type'
        required: false
        default: '2'
      parse_limit:
        description: 'Max pending docs parsed per AMC'
        required: false
        default: '200'
      sbi_portfolio_url:
        description: 'Optional exact SBI monthly portfolio URL (leave empty for auto-discovery)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Ingest + parse disclosures
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_RAW_BUCKET: ${{ secrets.R2_RAW_BUCKET }}
          R2_COLD_BUCKET: ${{ secrets.R2_COLD_BUCKET }}
          MF_HDFC_FACTSHEET_PAGE_URL: ${{ secrets.MF_HDFC_FACTSHEET_PAGE_URL }}
          MF_HDFC_PORTFOLIO_PAGE_URL: ${{ secrets.MF_HDFC_PORTFOLIO_PAGE_URL }}
          MF_SBI_FACTSHEET_PAGE_URL: ${{ secrets.MF_SBI_FACTSHEET_PAGE_URL }}
          MF_SBI_PORTFOLIO_PAGE_URL: ${{ secrets.MF_SBI_PORTFOLIO_PAGE_URL }}
          MF_HDFC_FACTSHEET_DOCUMENT_URLS: ${{ secrets.MF_HDFC_FACTSHEET_DOCUMENT_URLS }}
          MF_HDFC_PORTFOLIO_DOCUMENT_URLS: ${{ secrets.MF_HDFC_PORTFOLIO_DOCUMENT_URLS }}
          MF_SBI_FACTSHEET_DOCUMENT_URLS: ${{ secrets.MF_SBI_FACTSHEET_DOCUMENT_URLS }}
          MF_SBI_PORTFOLIO_DOCUMENT_URLS: ${{ secrets.MF_SBI_PORTFOLIO_DOCUMENT_URLS }}
          MF_REQUIRE_R2_FOR_RAW_STORAGE: "true"
          DISPATCH_AMCS: ${{ inputs.amcs }}
          DISPATCH_MAX_DOCS: ${{ inputs.max_documents }}
          DISPATCH_PARSE_LIMIT: ${{ inputs.parse_limit }}
          DISPATCH_SBI_PORTFOLIO_URL: ${{ inputs.sbi_portfolio_url }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          if [ -z "$R2_ENDPOINT" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_RAW_BUCKET" ] || [ -z "$R2_COLD_BUCKET" ]; then
            echo "Error: Missing R2 secrets for R2-first ingestion"
            exit 1
          fi

          # Force stable source URLs even when optional URL secrets are unset.
          export MF_HDFC_FACTSHEET_PAGE_URL="${MF_HDFC_FACTSHEET_PAGE_URL:-https://www.hdfcfund.com/mutual-funds/factsheets}"
          export MF_HDFC_PORTFOLIO_PAGE_URL="${MF_HDFC_PORTFOLIO_PAGE_URL:-https://www.hdfcfund.com/statutory-disclosure/portfolio/monthly-portfolio}"
          export MF_SBI_FACTSHEET_PAGE_URL="${MF_SBI_FACTSHEET_PAGE_URL:-https://www.sbimf.com/factsheets}"
          export MF_SBI_PORTFOLIO_PAGE_URL="${MF_SBI_PORTFOLIO_PAGE_URL:-https://www.sbimf.com/portfolios}"
          export MF_HDFC_FACTSHEET_DOCUMENT_URLS="${MF_HDFC_FACTSHEET_DOCUMENT_URLS:-https://files.hdfcfund.com/s3fs-public/2026-05/HDFC%20MF%20Factsheet%20-%20April%202026.pdf,https://files.hdfcfund.com/s3fs-public/2026-05/HDFC%20MF%20Index%20Solutions%20Factsheet%20-%20April%202026.pdf}"
          export MF_SBI_FACTSHEET_DOCUMENT_URLS="${MF_SBI_FACTSHEET_DOCUMENT_URLS:-https://www.sbimf.com/docs/default-source/scheme-factsheets/all-sbimf-schemes-factsheet-april-2026.pdf?sfvrsn=2b0639d8_4}"
          if [ -n "${DISPATCH_SBI_PORTFOLIO_URL:-}" ]; then
            export MF_SBI_PORTFOLIO_DOCUMENT_URLS="$DISPATCH_SBI_PORTFOLIO_URL"
          fi

          AMCS="${DISPATCH_AMCS:-ppfas,icici,hdfc,sbi}"
          MAX_DOCS="${DISPATCH_MAX_DOCS:-2}"
          PARSE_LIMIT="${DISPATCH_PARSE_LIMIT:-200}"

          failed_amcs=()
          IFS=',' read -ra AMC_LIST <<< "$AMCS"
          for amc in "${AMC_LIST[@]}"; do
            amc="$(echo "$amc" | xargs)"
            if [ -z "$amc" ]; then
              continue
            fi
            echo "Processing AMC=$amc"
            ok=false
            for attempt in 1 2; do
              echo "AMC=$amc attempt=$attempt"
              if python -m backend.app.mf_ingestion.jobs.ingest_latest_amc_docs --amc "$amc" --all-document-types --max-documents "$MAX_DOCS" --strict && \
                 python -m backend.app.mf_ingestion.jobs.parse_pending_documents --amc "$amc" --limit "$PARSE_LIMIT" --strict --fail-on-needs-review; then
                ok=true
                break
              fi
              sleep $((attempt * 20))
            done
            if [ "$ok" != "true" ]; then
              failed_amcs+=("$amc")
              echo "AMC failed after retries: $amc"
            fi
          done

          if [ "${#failed_amcs[@]}" -gt 0 ]; then
            echo "Disclosures sync completed with failures: ${failed_amcs[*]}"
            exit 1
          fi
