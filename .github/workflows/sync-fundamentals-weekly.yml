name: Sync Fundamentals

on:
  schedule:
    - cron: '0 2 * * 6'
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'watchlist, full, or symbols'
        required: false
        default: 'watchlist'
        type: choice
        options:
          - watchlist
          - full
          - symbols
      symbols:
        description: 'Comma-separated symbols for on-demand refresh'
        required: false
        default: ''
      limit:
        description: 'Max symbols to refresh'
        required: false
        default: ''
      universe:
        description: 'Universe for full refresh'
        required: false
        default: 'NIFTY500'
      enable_shareholding_sync:
        description: 'Enable shareholding sync for this run (true/false)'
        required: false
        default: 'false'
      refresh_stock_core_snapshot:
        description: 'Refresh stock_core_snapshot after sync (true/false)'
        required: false
        default: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STOCK_DATA_PROVIDER: finedge
          FINEDGE_API_KEY: ${{ secrets.FINEDGE_API_KEY }}
          FUNDAMENTALS_WATCHLIST_SYMBOLS: ${{ vars.FUNDAMENTALS_WATCHLIST_SYMBOLS }}
          INDIANAPI_ENABLE_SCHEDULED_SYNC: "true"
          INDIANAPI_ENABLE_LIVE_CALLS: "false"
          INDIANAPI_MONTHLY_LIMIT: "5000"
          INDIANAPI_MONTHLY_RESERVE: "500"
          INDIANAPI_DAILY_SOFT_LIMIT: "120"
          ENABLE_STOCK_FUNDAMENTALS_SYNC: "true"
          ENABLE_SHAREHOLDING_SYNC: "false"
          ENABLE_STOCK_NEWS: "false"
          ENABLE_ANALYST_DATA: "false"
          DISPATCH_SCOPE: ${{ inputs.scope }}
          DISPATCH_SYMBOLS: ${{ inputs.symbols }}
          DISPATCH_LIMIT: ${{ inputs.limit }}
          DISPATCH_UNIVERSE: ${{ inputs.universe }}
          DISPATCH_ENABLE_SHAREHOLDING: ${{ inputs.enable_shareholding_sync }}
          DISPATCH_REFRESH_SNAPSHOT: ${{ inputs.refresh_stock_core_snapshot }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$FINEDGE_API_KEY" ]; then
            echo "Error: Missing SUPABASE_URL, SUPABASE_KEY, or FINEDGE_API_KEY"
            exit 1
          fi

          scope="${DISPATCH_SCOPE:-watchlist}"
          symbols="${DISPATCH_SYMBOLS:-}"
          limit="${DISPATCH_LIMIT:-}"
          universe="${DISPATCH_UNIVERSE:-NIFTY500}"
          enable_shareholding="${DISPATCH_ENABLE_SHAREHOLDING:-false}"
          refresh_snapshot="${DISPATCH_REFRESH_SNAPSHOT:-true}"

          if [ "$EVENT_SCHEDULE" = "0 2 1 * *" ]; then
            scope="full"
            limit="${limit:-500}"
            universe="NIFTY500"
          elif [ "$EVENT_SCHEDULE" = "0 2 * * 6" ]; then
            if [ "$(date -u +%d)" = "01" ]; then
              echo "Skipping weekly watchlist refresh because monthly full refresh runs today."
              exit 0
            fi
            scope="watchlist"
            limit="${limit:-100}"
          fi

          args=(--scope "$scope" --universe "$universe")
          if [ -n "$limit" ]; then
            args+=(--limit "$limit")
          fi
          if [ -n "$symbols" ]; then
            args=(--symbols "$symbols")
          fi

          if [ "$enable_shareholding" = "true" ]; then
            export ENABLE_SHAREHOLDING_SYNC="true"
          fi

          python -m backend.app.jobs.sync_fundamentals "${args[@]}"
          python -m backend.app.jobs.calculate_ratios
          if [ "$refresh_snapshot" = "true" ]; then
            python -m backend.app.jobs.backfill_stock_core_snapshot --only-missing false
          fi
