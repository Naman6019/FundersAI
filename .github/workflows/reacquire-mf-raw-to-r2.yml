name: Reacquire MF Raw Docs To R2

on:
  workflow_dispatch:
    inputs:
      amc:
        description: 'Optional AMC filter, e.g. axis'
        required: false
        default: ''
      limit:
        description: 'Max local-only rows to reacquire'
        required: false
        default: '20'
      dry_run:
        description: 'Dry run only (true/false)'
        required: false
        default: 'true'

jobs:
  reacquire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Reacquire local-only raw documents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_RAW_BUCKET: ${{ secrets.R2_RAW_BUCKET }}
          R2_COLD_BUCKET: ${{ secrets.R2_COLD_BUCKET }}
          MF_REQUIRE_R2_FOR_RAW_STORAGE: "true"
          DISPATCH_AMC: ${{ inputs.amc }}
          DISPATCH_LIMIT: ${{ inputs.limit }}
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          if [ -z "$R2_ENDPOINT" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_RAW_BUCKET" ] || [ -z "$R2_COLD_BUCKET" ]; then
            echo "Error: Missing R2 secrets"
            exit 1
          fi

          args=(--limit "${DISPATCH_LIMIT:-20}")
          if [ -n "${DISPATCH_AMC:-}" ]; then
            args+=(--amc "$DISPATCH_AMC")
          fi
          if [ "${DISPATCH_DRY_RUN:-true}" = "true" ]; then
            args+=(--dry-run)
          fi

          python -m backend.app.mf_ingestion.jobs.reacquire_local_raw_documents "${args[@]}"
