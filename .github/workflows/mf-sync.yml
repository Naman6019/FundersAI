name: Mutual Fund Data Sync

on:
  schedule:
    # 11:00 PM IST is 17:30 UTC, Mon-Fri
    - cron: '30 17 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: mutual-fund-data-sync
  cancel-in-progress: false

jobs:
  sync_mf_data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run AMFI MF Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/scripts/sync_mf.py

      - name: Sync MF Enrichment (AMFI + AMC disclosures)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m backend.app.jobs.sync_mf_enrichment_unified
