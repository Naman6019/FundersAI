name: Mutual Fund Data Sync

on:
  schedule:
    # 6:30 PM IST is 13:00 UTC, Mon-Fri
    - cron: '30 13 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync_mf_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run AMFI MF Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/scripts/sync_mf.py

      - name: Backfill MF NAV History
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MF_HISTORY_SCHEME_LIMIT: "200"
        run: python backend/scripts/sync_mf_history.py

      - name: Sync MF Metadata (AMFI - TER/AUM)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/scripts/sync_mf_metadata.py

      - name: Sync MF NAV Snapshot + Metrics (MFapi)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ENABLE_MF_NAV_SYNC: "true"
        run: python -m backend.app.jobs.sync_mf_nav

      - name: Sync MF Engine Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ENABLE_MF_ENGINE_SYNC: "true"
          MF_ENGINE_BASE_URL: ${{ secrets.MF_ENGINE_BASE_URL }}
          MF_ENGINE_EMAIL: ${{ secrets.MF_ENGINE_EMAIL }}
          MF_ENGINE_PASSWORD: ${{ secrets.MF_ENGINE_PASSWORD }}
          MF_ENGINE_PARTNER_TOKEN: ${{ secrets.MF_ENGINE_PARTNER_TOKEN }}
        run: python -m backend.app.jobs.sync_mf_engine_enrichment
