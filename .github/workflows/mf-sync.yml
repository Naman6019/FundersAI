name: Mutual Fund Data Sync

on:
  schedule:
    # 11:00 PM IST is 17:30 UTC, Mon-Fri
    - cron: '30 17 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync_mf_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run AMFI MF Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/scripts/sync_mf.py

      - name: Backfill MF NAV History
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MF_HISTORY_SCHEME_LIMIT: "200"
        run: python backend/scripts/sync_mf_history.py

      - name: Sync MF NAV Snapshot + Metrics (MFapi)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ENABLE_MF_NAV_SYNC: "true"
        run: python -m backend.app.jobs.sync_mf_nav

      - name: Sync MF Enrichment (AMFI + optional MFdata fallback)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ENABLE_MFDATA_FALLBACK_SYNC: "false"
        run: python -m backend.app.jobs.sync_mf_enrichment_unified
