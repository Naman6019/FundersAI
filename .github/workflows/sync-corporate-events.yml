name: Sync Corporate Events

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CORPORATE_EVENTS_PROVIDER: finedge
          FINEDGE_API_KEY: ${{ secrets.FINEDGE_API_KEY }}
          INDIANAPI_ENABLE_CORPORATE_EVENTS_FALLBACK: "false"
          ENABLE_CORPORATE_ACTIONS_SYNC: "false"
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          if [ "$ENABLE_CORPORATE_ACTIONS_SYNC" = "true" ] && [ -z "$FINEDGE_API_KEY" ]; then
            echo "Error: Missing FINEDGE_API_KEY"
            exit 1
          fi
          python -m backend.app.jobs.sync_corporate_events
